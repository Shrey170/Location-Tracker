<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Accept Location Request</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <div class="glass-container">
    <h2>📡 Share Live Location</h2>
    <p style="text-align: center; color: var(--text-muted); margin-top: -10px; margin-bottom: 20px;">
      Someone has requested to view your live location.
    </p>

    <button class="success pulse-btn" onclick="acceptRequest()" id="startBtn">
      ✅ Yes, Share Location
    </button>
    <button class="danger" onclick="stopSharing()" id="stopBtn" style="display:none;">
      🛑 Stop Sharing
    </button>
    
    <div id="result"></div>
  </div>

  <script src="accept.js?v=4"></script>
</body>
</html>
