<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Track Location</title>
  <link rel="stylesheet" href="index.css" />
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
  <div class="glass-container dashboard-container">
    <h2>🌍 Live Tracking Dashboard</h2>

    <input type="text" id="requestIdInput" placeholder="Enter Request ID (e.g. 6890...)" />
    <button class="primary" onclick="startTracking()">
      🛰️ Start Tracking
    </button>

    <div id="output"></div>

    <div class="map-container">
      <div id="map"></div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="track.js?v=6"></script>
</body>
</html>
